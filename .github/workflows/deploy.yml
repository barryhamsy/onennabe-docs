name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # Runs automatically every 6 hours (At minute 0 past every 6th hour)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to manually trigger the run via the GitHub UI

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install MkDocs and Material theme
        run: |
          pip install mkdocs-material

      - name: Fetch Latest Steam Client Versions
        run: |
          python -c '
          import urllib.request
          import re

          url = "https://raw.githubusercontent.com/OpenSteam001/steam-monitor/main/README.md"
          target_file = "docs/steam.md"  # <--- Change this to your exact markdown file path

          try:
              with urllib.request.urlopen(url) as response:
                  content = response.read().decode("utf-8")
              
              # Find the table section
              match = re.search(r"(\| Channel \|.*?\n\n)", content, re.DOTALL)
              if match:
                  table_content = match.group(1).strip()
                  
                  # Overwrite or append to your file
                  with open(target_file, "w") as f:
                      f.write("# Latest Steam Client Versions\n\n")
                      f.write("This table updates automatically every 6 hours.\n\n")
                      f.write(table_content + "\n")
                  print("Steam versions successfully fetched!")
              else:
                  print("Could not find the table pattern in the source markdown.")
          except Exception as e:
              print(f"Error updating table: {e}")
          '

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
